<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}WildLifeLens Operations{% endblock %}</title>
    <script src="{{ url_for('static', filename='js/htmx.min.js') }}"></script>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <style>
        body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 900px; }
        nav { margin-bottom: 2rem; border-bottom: 1px solid #ccc; padding-bottom: 0.75rem; }
        nav a { margin-right: 1rem; }
        form { margin-bottom: 1rem; }
        .error { color: #b00020; }
        .ok { color: #006400; }
        .card { border: 1px solid #ddd; padding: 1rem; border-radius: 6px; margin: 1rem 0; }
        .status { font-weight: bold; }
        input, select, button { padding: 0.4rem 0.6rem; font-size: 1rem; }
        button { cursor: pointer; }
    </style>
    <script>
        (function () {
            var key = 'wll-device-id';
            var id = localStorage.getItem(key);
            if (!id) {
                id = 'dev-' + Math.random().toString(36).slice(2, 10) + '-' + Date.now();
                localStorage.setItem(key, id);
            }
            document.addEventListener('htmx:configRequest', function (evt) {
                var token = document.querySelector('meta[name="csrf-token"]');
                if (token) { evt.detail.headers['X-CSRFToken'] = token.getAttribute('content'); }
                evt.detail.headers['X-Device-ID'] = id;
            });
        })();
    </script>
</head>
<body>
<nav>
    <a href="/members">Members</a>
    <a href="/orders/create">Create Order</a>
    <a href="/schedules">Schedules</a>
    <a href="/bookings">Bookings</a>
    <a href="/kds">KDS</a>
    <a href="/search">Search</a>
    <a href="/clock-in">Clock-In</a>
    <a href="/exports">Exports</a>
    <a href="/risk">Risk</a>
    {% if user %}
        <span style="float: right;">
            Logged in as <strong>{{ user.username }}</strong>
            ({{ user.role_names()|join(", ") }})
            <form action="/auth/logout" method="post" style="display: inline;">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button type="submit">Logout</button>
            </form>
        </span>
    {% else %}
        <a href="/login" style="float: right;">Login</a>
    {% endif %}
</nav>
{% block content %}{% endblock %}
</body>
</html>
