{% extends "base.html" %}
{% block title %}Create Order — WildLifeLens{% endblock %}
{% block content %}
<h1>Create Order</h1>

{% if error %}
    <div class="error" data-testid="order-error">{{ error }}</div>
{% endif %}

<form method="post" action="/orders/create">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
        <label>Member
            <select name="member_id" required>
                {% for m in members %}
                    <option value="{{ m.id }}">{{ m.name }} — {{ m.member_id }} ({{ m.phone_number }})</option>
                {% endfor %}
            </select>
        </label>
        <small>Phone numbers shown are masked for non-admin users.</small>
    </div>
    <div>
        <label>Subtotal
            <input type="number" name="subtotal" step="0.01" min="0" required>
        </label>
    </div>
    <div>
        <label>Discount
            <input type="number" name="discount" step="0.01" min="0" value="0">
        </label>
    </div>
    <button type="submit">Create Order</button>
</form>
{% endblock %}
