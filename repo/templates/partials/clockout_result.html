{% if error %}
    <div class="error" data-testid="clockout-error">{{ error }}</div>
{% elif result %}
    {% if result.success %}
        <div class="ok" data-testid="clockout-success">
            Clock-out successful. Signature: {{ result.signature[:12] }}...
        </div>
    {% else %}
        <div class="error" data-testid="clockout-failure">
            Clock-out failed: {{ result.reason }}
        </div>
    {% endif %}
{% endif %}
